name: Hardsub_And_Upload_To_HF
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینکی ڤیدیۆکە (بە تۆکنەکەیەوە)'
        required: true
      subtitle_url:
        description: 'لینکی فایلی ژێرنووسەکە (.srt یان .vtt)'
        required: true
      file_name:
        description: 'ناوی فایلی کۆتایی لەناو Hugging Face (بۆ نمونە: movie.mp4)'
        required: true
        default: 'movie_hardsubbed.mp4'
      referer_url:
        description: 'سەرچاوەی لینکەکە (بۆ تێپەڕاندنی 403 Forbidden)'
        required: true
        default: 'https://zedflix.tv/'

jobs:
  hardsub_upload_job:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4
        # ئەم بەشە نوێیە بۆ ئەوەی گیتھەب فۆنتەکەی خۆت (myfont.ttf) بخوێنێتەوە

      - name: 🏗️ Setup Tools & Python Libs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg curl fontconfig -qq
          # دابەزاندنی دوو کتێبخانەی نوێ بۆ لکاندنی پیتە کوردییەکان
          python -m pip install -U pip yt-dlp huggingface_hub arabic-reshaper python-bidi

      - name: 🔠 Install Custom Font
        run: |
          mkdir -p ~/.fonts
          if [ -f "myfont.ttf" ]; then
            cp myfont.ttf ~/.fonts/
            fc-cache -f -v
            # ئەم کۆدە بە ئۆتۆماتیکی ناوی ناوەوەی فۆنتەکەت دەدۆزێتەوە
            FONT_NAME=$(fc-scan --format "%{family}\n" myfont.ttf | head -n 1 | awk -F',' '{print $1}')
            echo "FONT_NAME=$FONT_NAME" >> $GITHUB_ENV
            echo "✅ فۆنتەکە ناسێنرا بە ناوی: $FONT_NAME"
          else
            echo "❌ هەڵە: فایلی myfont.ttf نەدۆزرایەوە لەناو گیتھەبەکەت! تکایە ئەپلۆدی بکە."
            exit 1
          fi

      - name: ⬇️ Download Video
        run: |
          yt-dlp \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --add-header "Referer: ${{ inputs.referer_url }}" \
            --add-header "Origin: ${{ inputs.referer_url }}" \
            -o "input_video.mp4" "${{ inputs.video_url }}"

      - name: 📝 Download Subtitle (SRT or VTT)
        run: |
          SUB_URL="${{ inputs.subtitle_url }}"
          if [[ "$SUB_URL" == *".vtt"* ]]; then
            curl -L -o "subtitle.vtt" "$SUB_URL"
            echo "SUB_FILE=subtitle.vtt" >> $GITHUB_ENV
          else
            curl -L -o "subtitle.srt" "$SUB_URL"
            echo "SUB_FILE=subtitle.srt" >> $GITHUB_ENV
          fi

      - name: 🔧 Fix Kurdish Letters (لکاندنی پیتەکان)
        run: |
          python3 -c "
          import os
          import arabic_reshaper
          from bidi.algorithm import get_display

          file_path = os.getenv('SUB_FILE')
          
          with open(file_path, 'r', encoding='utf-8') as f:
              lines = f.readlines()

          with open(file_path, 'w', encoding='utf-8') as f:
              for line in lines:
                  # پاراستنی کاتەکان، تەنها دەستکاری وشەکان دەکەین
                  if '-->' in line or line.strip().isdigit() or line.startswith('WEBVTT') or line.startswith('Kind:') or line.startswith('Language:'):
                      f.write(line)
                  elif line.strip() == '':
                      f.write('\n')
                  else:
                      # ڕێکخستن و لکاندنی پیتەکان
                      reshaped_text = arabic_reshaper.reshape(line.strip())
                      bidi_text = get_display(reshaped_text)
                      f.write(bidi_text + '\n')
          "

      - name: 🎬 Hardsub Video
        run: |
          # بەکارهێنانی فۆنتەکەی خۆت بە شێوەیەکی ئۆتۆماتیکی
          ffmpeg -i input_video.mp4 -vf "subtitles=${{ env.SUB_FILE }}:force_style='Fontname=${{ env.FONT_NAME }},Fontsize=22,MarginV=25'" -c:v libx264 -preset ultrafast -c:a copy final_video.mp4

      - name: 🚀 Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FILE_NAME: ${{ inputs.file_name }}
        run: |
          python3 -c "
          import os
          from huggingface_hub import HfApi
          
          token = os.getenv('HF_TOKEN')
          api = HfApi()
          repo_id = 'Sarko717227/Ai_SMART'
          file_name = os.getenv('FILE_NAME', 'movie_hardsubbed.mp4')
          
          api.upload_file(
              path_or_fileobj='final_video.mp4',
              path_in_repo=file_name,
              repo_id=repo_id,
              repo_type='dataset',
              token=token
          )
          "
